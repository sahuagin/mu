# 2026-05-16 overnight worker run — inaugural telemetry dataset.
#
# Five workers spawned in parallel under the overnight goal-session
# protocol (supervisor bead mu-6znf). Worker registry recorded in
# ~/.claude-personal/experiments/overnight-2026-05-16/workers.tsv.
# Per-worker state.json files preserved under ~/.claude-personal/jobs/.
# This dataset is referenced from spec mu-043 and bead mu-mk9l.
#
# Outcome assignments below are the operator's documentary record of
# what each attempt produced, determined from PR review + worker
# state.json + commit content at the time. They are NOT the output of
# the live classifier — backfill bypasses classification by design.
#
# Timestamps use unix milliseconds; values are derived from the
# preserved state.json createdAt/updatedAt fields where available, and
# left null where the attempt left no recoverable timestamp ("don't
# fabricate" per mu-043 §Discipline).

