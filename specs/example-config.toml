# mu config — example operator file.
#
# Place at ~/.config/mu/config.toml (per-user) or
# /etc/mu/config.toml (site-wide).
#
# Site config loads first, operator config overlays. Either may be
# absent. Code defaults apply to any field neither file specifies, so
# this whole file is optional.
#
# Layered resolution order (later wins):
#   1. Code defaults (mu_core::config::Config::default)
#   2. /etc/mu/config.toml
#   3. ~/.config/mu/config.toml
#   4. CLI flags to mu serve / mu-tui (resolved by consumers)
#   5. Per-session RPC params (handled at dispatch time)
#
# Arrays REPLACE (do not append) across layers. The judge.ranking
# array in this file would wholesale replace any site-level ranking,
# not extend it. This is intentional: operator-edited config is the
# authoritative override.

# ── Compaction ────────────────────────────────────────────────────

# Context-size vocabulary (one definition, used throughout mu):
#   hard limit — the model's ABSOLUTE maximum context size (per-model,
#                from the model catalog / models.toml). The ceiling.
#                Shown in the TUI for reference; mu never drives to it.
#   soft limit — the BUDGET mu manages context against. This single
#                number is, at once: the denominator the TUI context
#                meter fills toward, the basis of the ctx:% reading, AND
#                the point at which the agent loop compacts. Per-model
#                via the catalog's context_soft_limit; optionally
#                overridden globally here (see context_soft_limit below).
#   fill       — how full the context currently is (the last model
#                call's input tokens). The meter shows fill / soft.
# Because the soft limit drives BOTH the meter and compaction, changing
# it moves the displayed bar and the compaction point together.

[compaction]
# Policy to instantiate at session creation:
#   "heuristic"         — SpanFamilyDropPolicy (mu-kgu.2); drops
#                         low-retention spans when the soft limit is
#                         crossed. The default; needs no judge model.
#   "hash-and-summary"  — HashAndSummaryPolicy (mu-kgu.3) — needs a
#                         judge model; see [compaction.judge] below.
#   "no-compaction"     — identity policy; the soft limit is still shown
#                         in status but context is NEVER compacted.
# Default (code): "heuristic".
default_policy = "heuristic"

# GLOBAL soft-limit override, in tokens. Same name as the per-model
# context_soft_limit in the model catalog (models.toml) on purpose: this
# is that same knob at a wider scope. It is the budget mu manages context
# against — the TUI meter denominator AND the compaction trigger (one
# number, by design).
#
# Leave this UNSET (the default) to let each session use its MODEL's own
# context_soft_limit — so a 1M-context model and a 32k model get
# appropriately different budgets. Set it to force ONE budget across every
# model regardless of the catalog. Precedence: this override > per-model
# context_soft_limit > (last resort) the model's context_hard_limit. There
# is no magic constant fallback: a model the catalog doesn't know at all
# simply shows no meter and isn't compacted.
#
# Tune per-model limits in models.toml instead, e.g. claude-opus-4-8
# already ships context_soft_limit = 200000, context_hard_limit = 1000000.
#
# context_soft_limit = 200_000

[compaction.judge]
# Output mode for HashAndSummaryPolicy:
#   "index_keep" — mu-kgu.7 rung-B; positional kept-spans + summary
#   "hash_keep"  — mu-kgu.3 v1; content-hashed kept-spans + summary
output_mode = "index_keep"

# Wall-clock cap for one judge call.
timeout_secs = 60

# Ordered preference list. The daemon walks this on each compaction
# event; first entry whose provider+auth is available wins. Empty
# (the default) leaves the canned judge in place — mu-kgu.3 behavior.
# mu-kgu.11 (planned) is what actually consumes this ranking.
[[compaction.judge.ranking]]
provider = "openrouter"
model = "deepseek-chat"
auth = "api_key"

[[compaction.judge.ranking]]
provider = "anthropic"
model = "claude-haiku-4-5"
auth = "oauth"

[[compaction.judge.ranking]]
provider = "anthropic"
model = "claude-haiku-4-5"
auth = "api_key"


# ── Providers ─────────────────────────────────────────────────────

[providers]
# Auth-source preference per provider. First available wins.
anthropic_auth_ranking  = ["oauth", "api_key"]
openrouter_auth_ranking = ["api_key"]
codex_auth_ranking      = ["oauth"]

[providers.proxy]
# Local proxy for OAuth-mediated traffic. Defaults to unset
# (no proxying). When set, the listed providers route through it.
# url = "http://127.0.0.1:3180"
# use_for = ["anthropic"]


# ── Session ───────────────────────────────────────────────────────

[session]
# Write event-log JSONL to disk under <state_dir>/events/...
# Today's default behavior (mu-upb). Set false for ephemeral mode.
persist_events_to_disk = true

# Reload sessions from disk on daemon restart. v1 default is false;
# the read-side machinery lands in mu-mh4.
resume_on_daemon_restart = false

# Root directory for daemon state. Unset = platform default
# (~/.local/share/mu on Linux). The events subdir derives from this:
# <state_dir>/events/<daemon_id>/<session_id>.jsonl.
# state_dir = "/var/lib/mu"


# ── UI (TUI) ──────────────────────────────────────────────────────

[ui.tui]
# Defaults the TUI uses when the operator hits `n` for a new session
# (and didn't override via --provider/--model on the command line).
default_provider = "anthropic_api"
default_model    = "claude-haiku-4-5-20251001"


# ── Budget ────────────────────────────────────────────────────────

[budget]
# Soft thresholds for operator awareness. Hard caps still come from
# CLI flags (e.g. --max-budget-usd). Unset = no warning.
# api_key_daily_warn_usd  = 10
# api_key_weekly_warn_usd = 30


# ── Recall (session-start context) ────────────────────────────────
# Controls what mu injects into a session's context at start. The
# providers run in order: bootloader preamble (off by default), the
# agent-memory kernel, then the project files (MU.md / AGENTS.md from
# the cwd, then <config-dir>/mu/). Defaults below match shipped behavior.

[recall]
# Master switch for ALL session-start injection. false = discover-on-demand
# (no front-loaded context at all, including project files).
enabled = true

# Memory-injection tier passed to the agent-memory CLI
# (`agent memory context --tier <this>`): "identity" (default) = the small
# user-identity kernel; "full" = the larger four-section memory wall.
tier = "identity"

# Toggle the agent-memory provider INDEPENDENTLY of the project files.
# true (default) injects the agent.sqlite-backed kernel. Set false to run
# with ONLY the file-based project context (MU.md / AGENTS.md) and no
# memory injection — without turning off all recall (enabled = false).
memory = true

# Path to the memory CLI the agent-memory provider invokes. Unset (default)
# uses ~/.local/bin/agent. Set this to point mu at a different binary
# instead of relying on that hardcoded path.
# memory_binary = "/usr/local/bin/agent"

# Prompt-time kx document hints. When true, each user turn runs
# `agent kx recall <prompt>` and injects a compact doc-pointer block after the
# prompt, similar to Claude Code's UserPromptSubmit hook. Default false because
# recall may call your configured embedder/API.
kx = false
# kx_binary = "/usr/local/bin/agent"  # unset = ~/.local/bin/agent
kx_limit = 4
kx_min_score = 0.60

# First-position "this is startup orientation, not the task" preamble.
# false (default) = no preamble. The MU_RECALL_BOOTLOADER=0/1 env var
# overrides this per-session.
bootloader = false

# Override text for the bootloader preamble. Unset = the built-in wording.
# Only consulted when bootloader = true.
# bootloader_text = "## Bootloader\n..."

# Hermetic mode: recall off AND the discovery bootstrap suppressed, so a
# session gets NO mu-injected system content. Set by `mu ask/serve --bare`;
# here for completeness.
bare = false
